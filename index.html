<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codexel.ai - Professional Browser IDE</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app-container">
        <header class="ide-header">
            <div class="logo">
                <span class="logo-bold">Codexel</span>.ai
            </div>
            <div class="status-indicator">
                <span id="status-text">Booting...</span>
            </div>
        </header>
        <main class="ide-main">
            <aside class="sidebar">
                <div class="sidebar-header">FILES</div>
                <ul class="file-list">
                    <li class="file-item active" data-file="index.js">index.js</li>
                    <li class="file-item" data-file="package.json">package.json</li>
                </ul>
            </aside>
            <section class="editor-pane">
                <div class="pane-header">index.js</div>
                <div id="editor-container"></div>
            </section>
            <section class="output-pane">
                <div class="preview-section">
                    <div class="pane-header">PREVIEW</div>
                    <div id="preview-container">
                        <iframe src="loading.html" id="preview-iframe"></iframe>
                    </div>
                </div>
                <div class="terminal-section">
                    <div class="pane-header">TERMINAL</div>
                    <div id="terminal-container"></div>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
